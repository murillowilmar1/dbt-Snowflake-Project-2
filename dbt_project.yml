name: dbt_saas_demo
version: 1.0.0
config-version: 2

profile: dbt_saas_demo

model-paths: ["models"]
macro-paths: ["macros"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  dbt_saas_demo:
    +persist_docs:
      relation: true
      columns: true

    staging:
      +materialized: view
      +schema: staging

    intermediate:
      +materialized: view
      +schema: intermediate

    marts:
      +schema: marts
      dims:
        +materialized: view
      facts:
        +materialized: incremental
        +incremental_strategy: merge
        +on_schema_change: sync_all_columns